<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card: #fffdf7;
      --accent: #e05a2b;
      --accent2: #f5a623;
      --text: #1a1a1a;
      --muted: #888;
      --done: #b0b0b0;
      --border: #e0d8cc;
      --shadow: 4px 4px 0px #1a1a1a;
    }

    body {
      background-color: var(--bg);
      font-family: 'Gowun Dodum', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 3rem;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1rem;
      border: 2px solid var(--text);
      border-radius: 0;
      background: var(--card);
      outline: none;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s;
    }

    .input-row input:focus {
      box-shadow: 6px 6px 0px var(--accent);
    }

    .input-row button {
      padding: 12px 20px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1rem;
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--text);
      border-radius: 0;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .input-row button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--text);
    }

    .input-row button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--text);
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 0.85rem;
      border: 2px solid var(--text);
      background: var(--card);
      cursor: pointer;
      transition: background 0.15s;
    }

    .filters button.active {
      background: var(--text);
      color: #fff;
    }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card);
      border: 2px solid var(--text);
      box-shadow: var(--shadow);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .todo-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-all;
      transition: color 0.2s, text-decoration 0.2s;
    }

    .todo-item.done .todo-text {
      color: var(--done);
      text-decoration: line-through;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .todo-item .delete-btn:hover {
      color: var(--accent);
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .footer button {
      background: none;
      border: none;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 0.85rem;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>TODO<span>.</span></h1>
    <p>할 일을 추가하고 하나씩 완료해보세요 ✅</p>
  </header>

  <div class="input-row">
    <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." />
    <button onclick="addTodo()">추가</button>
  </div>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">전체</button>
    <button onclick="setFilter('active', this)">진행 중</button>
    <button onclick="setFilter('done', this)">완료</button>
  </div>

  <ul id="todo-list"></ul>

  <div class="footer">
    <span id="count-text">0개 남음</span>
    <button onclick="clearDone()">완료 항목 삭제</button>
  </div>
</div>

<script>
  let todos = [];
  let filter = 'all';

  function addTodo() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) return;

    todos.push({ id: Date.now(), text, done: false });
    input.value = '';
    render();
  }

  function toggleTodo(id) {
    todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
    render();
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('todo-list');
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<li class="empty">할 일이 없습니다 🎉</li>';
    } else {
      list.innerHTML = filtered.map(t => `
        <li class="todo-item ${t.done ? 'done' : ''}" id="item-${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})" />
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">✕</button>
        </li>
      `).join('');
    }

    const remaining = todos.filter(t => !t.done).length;
    document.getElementById('count-text').textContent = `${remaining}개 남음`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter 키로 추가
  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
